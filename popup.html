<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      color: #333;
      padding: 16px;
    }
    h2 {
      font-size: 15px;
      margin-bottom: 12px;
    }
    .section {
      margin-bottom: 14px;
    }
    .section label {
      display: block;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .input-row {
      display: flex;
      gap: 6px;
    }
    .input-row input {
      flex: 1;
      padding: 6px 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
    }
    .input-row input:focus {
      outline: none;
      border-color: #6b4fbb;
    }
    button {
      padding: 6px 12px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
    }
    .btn-add {
      background: #6b4fbb;
      color: #fff;
    }
    .btn-add:hover {
      background: #5a3fa8;
    }
    .btn-remove {
      background: none;
      color: #e24329;
      padding: 2px 6px;
      font-size: 12px;
    }
    .btn-remove:hover {
      text-decoration: underline;
    }
    .site-list {
      list-style: none;
      margin-top: 8px;
    }
    .site-list li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 0;
      border-bottom: 1px solid #eee;
      font-size: 12px;
    }
    .site-list li:last-child {
      border-bottom: none;
    }
    .default-tag {
      color: #999;
      font-size: 11px;
      margin-left: 4px;
    }
    .status {
      font-size: 12px;
      color: #28a745;
      margin-top: 6px;
      min-height: 18px;
    }
    .status.error {
      color: #e24329;
    }
  </style>
</head>
<body>
  <h2>GitlabClip</h2>

  <div class="section">
    <label>Add Self-Hosted GitLab</label>
    <div class="input-row">
      <input type="text" id="domain" placeholder="e.g. gitlab.example.com">
      <button class="btn-add" id="addBtn">Add</button>
    </div>
    <div class="status" id="status"></div>
  </div>

  <div class="section">
    <label>Enabled Sites</label>
    <ul class="site-list" id="siteList"></ul>
  </div>

  <script src="popup.js"></script>
</body>
</html>
